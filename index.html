<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KanhaWear</title>

<link rel="stylesheet" href="css/style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<header class="header glass">
  
  <div class="logo-container">
    <img src="assets/logo.png" class="logo">
    <span class="brand">KanhaWear</span>
  </div>

  <div class="nav-buttons">
    <button class="btn glass-btn" onclick="customDesign()">Custom Design</button>
    <button class="btn glass-btn" onclick="location.href='admin-login.html'">Admin</button>
  </div>

</header>

<!-- FILTERS -->
<section class="filters">
  <button class="filter-btn active" onclick="filterCategory('all', this)">All</button>
  <button class="filter-btn" onclick="filterCategory('c', this)">Clothes</button>
  <button class="filter-btn" onclick="filterCategory('a', this)">Accessories</button>
</section>

<section class="filters">
  <button class="filter-btn active" onclick="filterSeason('all', this)">All Seasons</button>
  <button class="filter-btn" onclick="filterSeason('winter', this)">Winter</button>
  <button class="filter-btn" onclick="filterSeason('summer', this)">Summer</button>
</section>
<div class="search-container">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search products..." 
    oninput="searchProducts()"
  >
</div>
<!-- PRODUCTS GRID -->
<section id="products" class="products-grid"></section>

<!-- PAGINATION -->
<div id="pagination" class="pagination"></div>

<!-- ORDER MODAL -->
<div id="orderModal" class="modal">
  <div class="modal-content glass">

    <span class="close" onclick="closeModal()">×</span>

    <h2>Order Product</h2>

    <input id="name" placeholder="Your Name">
    <input id="address" placeholder="Address">
    <input id="qty" placeholder="Quantity">
    <input id="size" placeholder="Kanha ji Size">

    <button class="btn main-btn" onclick="sendOrder()">Send Order</button>

  </div>
</div>

<!-- FOOTER -->
<footer class="footer glass">

  <p class="brand">KanhaWear</p>
  <p>Premium Krishna Clothing & Accessories</p>

  <div class="footer-links">
    <a href="https://www.instagram.com/seedhemaut.exe" target="_blank">Instagram</a>
    <span>Email: Coming soon</span>
  </div>

</footer>

<!-- SCRIPTS -->
<!-- SCRIPTS -->
<script src="js/security.js"></script>
<script src="js/cache.js"></script>
<script src="js/store.js"></script>
<script src="js/pagination.js"></script>

<!-- LOADER (MOVE HERE ✅) -->
<div id="loader">
  <div class="spinner"></div>
</div>

<script>
window.onload = () => {
const loader = document.getElementById("loader");
if(loader) loader.style.display = "none";
};
</script>

</body>
</html>
